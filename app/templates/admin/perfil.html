{% extends 'admin_base.html' %}
{% block content %}
<div class="card card-dark border-0 shadow mt-2" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header border-secondary bg-transparent py-3 text-center">
        <h5 class="mb-0 text-white"><i class="fa-solid fa-user-shield text-cyber"></i> Perfil de Administrador</h5>
    </div>
    <div class="card-body">
        <form action="{{ url_for('admin.editar_perfil') }}" method="POST">
            <div class="mb-3">
                <label class="form-label text-secondary small">Nombre de Usuario</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" name="nombre_usuario" value="{{ admin.nombre_usuario }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary small">WhatsApp</label>
                <div class="input-group">
                    <span class="input-group-text bg-secondary border-secondary text-dark">+51</span>
                    <input type="text" class="form-control bg-dark text-white border-secondary" name="telefono_contacto" value="{{ admin.telefono_contacto or '' }}" placeholder="912345678">
                </div>
                <small class="text-secondary" style="font-size: 0.7rem;">Ingresa tu número de WhatsApp.</small>
            </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary small">Correo Electrónico</label>
                <input type="email" class="form-control bg-dark text-white border-secondary" name="correo" value="{{ admin.correo }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary small">Nueva Contraseña</label>
                <input type="password" class="form-control bg-dark text-white border-secondary" name="password" placeholder="Dejar en blanco para no cambiar">
            </div>
            <button type="submit" class="btn btn-cyber w-100 fw-bold">Guardar Cambios</button>
        </form>
    </div>
</div>
{% endblock %}
